---
layout: default
---

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/landing.css' | relative_url }}">

<div class="landing themed">

  <header class="ls-page-hero">
    <canvas id="ls-hero-canvas" class="ls-hero__canvas" aria-hidden="true"></canvas>
    <div class="landing__inner">
      <span class="ls-kicker">{{ page.kicker | default: "Ehsan Sharafian" }}</span>
      <h1>{{ page.title }}</h1>
      {% if page.tagline %}<p class="ls-page-hero__tag">{{ page.tagline }}</p>{% endif %}
    </div>
  </header>

  <div class="ls-page-body">
    <div class="landing__inner">
      <article class="ls-prose reveal">
        {{ content }}
      </article>
    </div>
  </div>

</div>

<script src="{{ '/assets/js/landing.js' | relative_url }}" defer></script>
